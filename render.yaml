services:
  - type: web
    name: ecomx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ecomx-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: ecomx-db
    databaseName: ecomx
    user: ecomx
    plan: free
