<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — EcomX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-page" style="padding: 3rem 1rem;">
  <div class="auth-card" style="max-width:520px">

    <a href="index.html" class="auth-logo d-block mb-1">Ecom<span>X</span></a>

    <h2 class="auth-title">Create your account</h2>
    <p class="auth-subtitle">Join thousands of customers & sellers on EcomX</p>

    <!-- Role Selector -->
    <div class="mb-4">
      <label class="form-label">I want to join as</label>
      <div class="role-select-wrap">
        <div class="role-option active" data-role="customer">
          <i class="fa-solid fa-user mb-1 d-block" style="font-size:1.2rem;color:var(--primary)"></i>
          Customer
          <div style="font-size:.7rem;color:var(--gray-400);font-weight:400;margin-top:2px">Buy products</div>
        </div>
        <div class="role-option" data-role="seller">
          <i class="fa-solid fa-store mb-1 d-block" style="font-size:1.2rem;color:var(--secondary)"></i>
          Seller
          <div style="font-size:.7rem;color:var(--gray-400);font-weight:400;margin-top:2px">Sell products</div>
        </div>
      </div>
      <input type="hidden" id="role-input" value="customer">
    </div>

    <!-- Social Sign Up -->
    <div class="d-flex gap-2 mb-3">
      <button class="social-auth-btn">
        <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" width="18">
        Google
      </button>
      <button class="social-auth-btn">
        <i class="fab fa-facebook text-primary"></i>
        Facebook
      </button>
    </div>

    <div class="divider">or sign up with email</div>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" placeholder="John" required>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" placeholder="Doe" required>
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
          <input type="tel" class="form-control" placeholder="+1 (555) 000-0000">
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required>
          <button class="input-group-text bg-white border-start-0" type="button" onclick="togglePassword('password', this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <!-- Password strength -->
        <div class="mt-2">
          <div class="d-flex gap-1 mb-1">
            <div class="flex-fill" style="height:3px;background:var(--border);border-radius:2px" id="str1"></div>
            <div class="flex-fill" style="height:3px;background:var(--border);border-radius:2px" id="str2"></div>
            <div class="flex-fill" style="height:3px;background:var(--border);border-radius:2px" id="str3"></div>
            <div class="flex-fill" style="height:3px;background:var(--border);border-radius:2px" id="str4"></div>
          </div>
          <span id="str-text" style="font-size:.72rem;color:var(--gray-400)">Enter a password</span>
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" id="confirm-password" placeholder="Repeat your password" required>
        </div>
      </div>

      <!-- Seller-only field -->
      <div id="seller-fields" class="mt-3" style="display:none">
        <label class="form-label">Store Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-store"></i></span>
          <input type="text" class="form-control" placeholder="My Awesome Store">
        </div>
      </div>

      <div class="mt-3 d-flex gap-2 align-items-start">
        <input type="checkbox" class="form-check-input mt-1 flex-shrink-0" id="terms" required>
        <label class="form-check-label small" for="terms" style="color:var(--gray-500)">
          I agree to the <a href="#" style="color:var(--primary)">Terms of Service</a> and
          <a href="#" style="color:var(--primary)">Privacy Policy</a> of EcomX
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg mt-4">
        <i class="fa-solid fa-user-plus me-2"></i>Create Account
      </button>
    </form>

    <p class="text-center mt-3 small" style="color:var(--gray-500)">
      Already have an account?
      <a href="login.html" style="color:var(--primary);font-weight:600">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
}

// Password strength
document.getElementById('password').addEventListener('input', function () {
  const val = this.value;
  const bars = [document.getElementById('str1'), document.getElementById('str2'), document.getElementById('str3'), document.getElementById('str4')];
  const text = document.getElementById('str-text');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['var(--danger)', 'var(--warning)', 'var(--info)', 'var(--success)'];
  const labels = ['Weak', 'Fair', 'Good', 'Strong'];
  bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : 'var(--border)'; });
  text.textContent = val ? labels[score - 1] || 'Too short' : 'Enter a password';
  text.style.color = val ? colors[score - 1] : 'var(--gray-400)';
});

// Show seller fields on role select
document.querySelectorAll('.role-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    document.getElementById('role-input').value = opt.dataset.role;
    document.getElementById('seller-fields').style.display = opt.dataset.role === 'seller' ? 'block' : 'none';
  });
});

async function handleRegister(e) {
  e.preventDefault();
  const form = e.target;
  const btn  = form.querySelector('button[type=submit]');
  const role = document.getElementById('role-input').value;

  const firstName  = form.querySelectorAll('input[type=text]')[0].value.trim();
  const lastName   = form.querySelectorAll('input[type=text]')[1].value.trim();
  const email      = form.querySelector('input[type=email]').value.trim();
  const password   = document.getElementById('password').value;
  const confirm    = document.getElementById('confirm-password').value;
  const storeName  = role === 'seller' ? (form.querySelector('#seller-fields input') || {}).value : undefined;

  if (password !== confirm) {
    Toast.show('Passwords do not match.', 'error');
    return;
  }

  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Creating account...';
  btn.disabled = true;

  try {
    const res = await api.post('/api/auth/register', {
      name: `${firstName} ${lastName}`.trim(),
      email, password, role,
      store_name: storeName || undefined
    });
    if (res.ok) {
      Auth._saveUser(res.data.user, res.data.token);
      Toast.show('Account created! Welcome to EcomX.', 'success');
      setTimeout(() => {
        window.location.href = role === 'admin' ? 'admin/dashboard.html' : 'index.html';
      }, 800);
    } else {
      btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
      btn.disabled = false;
      Toast.show(res.data.error || 'Registration failed. Please try again.', 'error');
    }
  } catch(err) {
    // Backend not running — create a local demo session
    Auth._saveUser({ role, name: `${firstName} ${lastName}`.trim(), email, initials: (firstName[0]||'') + (lastName[0]||'') }, null);
    Toast.show('Account created! (Demo mode)', 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 800);
  }
}
</script>
</body>
</html>
