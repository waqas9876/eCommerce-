<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — EcomX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo d-block mb-1">Ecom<span>X</span></a>

    <!-- Step 1: Enter email -->
    <div id="step-email">
      <div class="text-center mb-4">
        <div style="width:64px;height:64px;background:var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
          <i class="fa-solid fa-lock-open" style="font-size:1.5rem;color:var(--primary)"></i>
        </div>
        <h2 class="auth-title mb-1">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your email and we'll generate a reset link for you.</p>
      </div>

      <div id="fp-alert" class="alert d-none mb-3" style="border-radius:10px;font-size:.875rem"></div>

      <form id="fp-form" onsubmit="handleForgot(event)">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
            <input type="email" class="form-control" id="fp-email" placeholder="you@example.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="fp-btn">
          <i class="fa-solid fa-paper-plane me-2"></i>Generate Reset Link
        </button>
      </form>

      <p class="text-center mt-3 small" style="color:var(--gray-500)">
        Remember your password?
        <a href="login.html" style="color:var(--primary);font-weight:600">Back to Login</a>
      </p>
    </div>

    <!-- Step 2: Show reset link (demo/localhost mode) -->
    <div id="step-link" class="d-none text-center">
      <div style="width:64px;height:64px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
        <i class="fa-solid fa-circle-check" style="font-size:1.5rem;color:var(--success)"></i>
      </div>
      <h2 class="auth-title mb-1">Reset Link Ready!</h2>
      <p class="auth-subtitle mb-4">Click the button below to reset your password.</p>

      <a id="reset-link-btn" href="#" class="btn btn-primary w-100 btn-lg mb-3">
        <i class="fa-solid fa-key me-2"></i>Reset My Password
      </a>

      <div class="p-3 rounded-3 text-start mb-3" style="background:var(--gray-100);font-size:.8rem">
        <div class="fw-600 mb-1" style="color:var(--gray-600)"><i class="fa-solid fa-circle-info me-1" style="color:var(--primary)"></i>Demo Mode</div>
        <div style="color:var(--gray-500)">In production, this link would be sent to your email automatically.</div>
      </div>

      <a href="login.html" class="small" style="color:var(--primary)">Back to Login</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
async function handleForgot(e) {
  e.preventDefault();
  var email  = document.getElementById('fp-email').value.trim();
  var btn    = document.getElementById('fp-btn');
  var alertEl = document.getElementById('fp-alert');

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Generating...';
  alertEl.className = 'alert d-none mb-3';

  try {
    var res = await fetch((api.BASE || 'http://localhost:5000') + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    var data = await res.json();

    if (data.reset_token) {
      var resetUrl = window.location.href.replace('forgot-password.html', '')
        + 'reset-password.html?token=' + encodeURIComponent(data.reset_token);
      document.getElementById('reset-link-btn').href = resetUrl;
      document.getElementById('step-email').classList.add('d-none');
      document.getElementById('step-link').classList.remove('d-none');
    } else {
      // Email not found but we don't reveal that
      alertEl.className = 'alert mb-3';
      alertEl.style.cssText = 'border-radius:10px;font-size:.875rem;background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d';
      alertEl.innerHTML = '<i class="fa-solid fa-circle-check me-2"></i>' + (data.message || 'If that email exists, a reset link has been sent.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Generate Reset Link';
    }
  } catch(e) {
    alertEl.className = 'alert mb-3';
    alertEl.style.cssText = 'border-radius:10px;font-size:.875rem;background:#fff5f5;border:1.5px solid #fecaca;color:#b91c1c';
    alertEl.innerHTML = '<i class="fa-solid fa-circle-exclamation me-2"></i>Could not connect to server. Make sure the backend is running.';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Generate Reset Link';
  }
}
</script>
</body>
</html>
